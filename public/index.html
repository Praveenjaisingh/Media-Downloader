<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Downloader</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 15px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            word-break: break-word;
        }

        .loader {
            margin-top: 15px;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #00ffcc;
            animation: load 2s infinite;
        }

        @keyframes load {
            0% { width: 0%; }
            50% { width: 80%; }
            100% { width: 0%; }
        }

        /* 🔥 Mobile Tweaks */
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
                border-radius: 15px;
            }

            h1 {
                font-size: 20px;
            }

            input, button {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>🎬 Downloader</h1>

        <input type="text" id="link" placeholder="Paste video/audio link here..." />

        <button onclick="download()">Download</button>

        <div class="loader" id="loader">
            <div class="progress"></div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        async function download() {
            const link = document.getElementById("link").value;
            const status = document.getElementById("status");
            const loader = document.getElementById("loader");

            if (!link) {
                status.innerText = "⚠️ Please enter a link";
                return;
            }

            status.innerText = "⏳ Downloading...";
            loader.style.display = "block";

            try {
                const res = await fetch("/api/downloadContent", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ link })
                });

                const data = await res.json();

                if (data.status) {
                    status.innerText = "✅ Download ready!";

                    const a = document.createElement("a");
                    a.href = data.fileUrl;
                    a.download = "";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    status.innerText = "❌ Failed: " + data.message;
                }

            } catch (err) {
                status.innerText = "❌ Server error";
            }

            loader.style.display = "none";
        }
    </script>

</body>

</html>
