<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Downloader</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff416c, #ff4b2b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: 0;
        }

        .circle1 {
            width: 250px;
            height: 250px;
            background: #00f2fe;
            top: -80px;
            left: -80px;
        }

        .circle2 {
            width: 300px;
            height: 300px;
            background: #ff00ff;
            bottom: -100px;
            right: -100px;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 35px 25px;
            border-radius: 25px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.25),
                inset 0 0 20px rgba(255, 255, 255, 0.05);

            text-align: center;
            color: white;
        }

        .logo {
            font-size: 55px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus {
            border-color: #00eaff;
            box-shadow: 0 0 12px rgba(0, 234, 255, 0.6);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;

            background: linear-gradient(135deg, #00c6ff, #0072ff);

            transition: 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 114, 255, 0.4);
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        .loader {
            width: 100%;
            height: 8px;
            margin-top: 18px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.12);
            display: none;
        }

        .progress {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #00fff0, #00c6ff);
            border-radius: 20px;
            animation: loading 1.2s infinite ease-in-out;
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(300%);
            }
        }

        .status {
            margin-top: 18px;
            font-size: 14px;
            min-height: 20px;
            opacity: 0.95;
            word-break: break-word;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 18px;
            }

            h1 {
                font-size: 24px;
            }

            .logo {
                font-size: 45px;
            }

            input,
            button {
                padding: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>Media Downloader</h1>
        <p class="subtitle">Fast • Stylish • Secure Downloads</p>
        <div class="input-box">
            <input type="text" id="link" placeholder="Paste your video/audio URL here..." />
        </div>
        <button onclick="download()">⬇ Download Now</button>
        <div class="loader" id="loader">
            <div class="progress"></div>
        </div>
        <div class="status" id="status"></div>
        <div class="footer">
            Made with ❤️
        </div>
    </div>
    <script>
        async function download() {
            const link = document.getElementById("link").value;
            const status = document.getElementById("status");
            const loader = document.getElementById("loader");
            if (!link) {
                status.innerHTML = "⚠️ Please enter a valid link";
                return;
            }
            status.innerHTML = "⏳ Preparing your download...";
            loader.style.display = "block";
            try {
                const res = await fetch("/api/downloadContent", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ link }),
                });
                const data = await res.json();
                if (data.status) {
                    status.innerHTML = "✅ Download ready! Starting...";
                    const a = document.createElement("a");
                    a.href = data.fileUrl;
                    a.download = "";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    status.innerHTML = "❌ " + data.message;
                }
            } catch (err) {
                status.innerHTML = "❌ Server error. Please try again.";
            }
            loader.style.display = "none";
        }
    </script>

</body>

</html>
